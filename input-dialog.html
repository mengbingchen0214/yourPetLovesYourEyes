<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: #f5f5f5;
  }
  input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
    outline: none;
  }
  input:focus { border-color: #007AFF; }
  .btns {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: flex-end;
  }
  button {
    padding: 6px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
  }
  .ok { background: #007AFF; color: white; }
  .cancel { background: #ddd; color: #333; }
</style>
</head>
<body>
  <input id="input" type="text" />
  <div class="btns">
    <button class="cancel" onclick="window.dialog.cancel()">取消</button>
    <button class="ok" onclick="submit()">确定</button>
  </div>
  <script>
    window.dialog.onInit(({ value }) => {
      const input = document.getElementById('input');
      input.value = value || '';
      input.focus();
      input.select();
    });
    function submit() {
      window.dialog.submit(document.getElementById('input').value);
    }
    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit();
      if (e.key === 'Escape') window.dialog.cancel();
    });
  </script>
</body>
</html>
